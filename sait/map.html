<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Robot Path Planner</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { margin: 0; font-family: Arial; }
        #map { height: 85vh; width: 100%; }
        .toolbar { height: 15vh; background: #222; display: flex; align-items: center; justify-content: center; gap: 20px; color: white; }
        button { padding: 12px 20px; font-size: 16px; border: none; cursor: pointer; border-radius: 8px; color: white; font-weight: bold; }
        #drawBtn { background: #4CAF50; }
        #eraseBtn { background: #f44336; }
        #sendBtn { background: #2196F3; }
        .active { outline: 3px solid white; transform: scale(1.05); }
        #stats { font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

<div class="toolbar">
    <div id="stats">Начертани: 0м</div>
    <button id="drawBtn" class="active">✏️ Молив</button>
    <button id="eraseBtn">🧽 Изчисти</button>
    <button id="sendBtn">🚀 СТАРТ РОБОТ</button>
</div>

<div id="map"></div>
<script src="map_logic.js"></script>
</body>
</html>
