<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Robot Path Planner</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { margin: 0; font-family: Arial; }
        #map { height: 85vh; width: 100%; }
        .toolbar { height: 15vh; background: #222; display: flex; align-items: center; justify-content: center; gap: 20px; color: white; }
        button { padding: 12px 20px; font-size: 16px; border: none; cursor: pointer; border-radius: 8px; color: white; font-weight: bold; }
        #drawBtn { background: #4CAF50; }
        #eraseBtn { background: #f44336; }
        #sendBtn { background: #2196F3; }
        .active { outline: 3px solid white; transform: scale(1.05); }
        #stats { font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

<div class="toolbar">
    <div id="stats">Начертани: 0м</div>
    <button id="drawBtn" class="active">✏️ Молив</button>
    <button id="eraseBtn">🧽 Изчисти</button>
    <button id="sendBtn">🚀 СТАРТ РОБОТ</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    // --- НАСТРОЙКИ ЗА КАЛИБРАЦИЯ (Променете тези стойности спрямо вашия робот) ---
    const METERS_PER_SECOND = 0.25; // Колко метра изминава робота за 1 секунда
    const DEGREES_PER_SECOND = 45;   // Колко градуса се завърта робота за 1 секунда
    // --------------------------------------------------------------------------

    const map = L.map('map').setView([42.6977, 23.3219], 18);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 22 }).addTo(map);

    let mode = "draw";
    let points = [];
    let lastPoint = null;
    let currentHeading = 0; // Робота започва сочейки на север (0 градуса)

    // Изчислява ъгъла между две координати
    function getBearing(p1, p2) {
        const lat1 = p1.lat * Math.PI / 180;
        const lat2 = p2.lat * Math.PI / 180;
        const lon1 = p1.lng * Math.PI / 180;
        const lon2 = p2.lng * Math.PI / 180;
        const y = Math.sin(lon2 - lon1) * Math.cos(lat2);
        const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(lon2 - lon1);
        return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    }

    map.on("click", function(e) {
        if (mode !== "draw") return;

        const latlng = e.latlng;
        if (lastPoint) {
            const dist = latlng.distanceTo(lastPoint);
            L.polyline([lastPoint, latlng], {color: 'red', weight: 5}).addTo(map)
             .bindTooltip(`${dist.toFixed(1)}m`, {permanent: true, direction: 'center'});
        }
        
        L.circleMarker(latlng, {radius: 6, color: 'green', fillOpacity: 1}).addTo(map);
        points.push(latlng);
        lastPoint = latlng;
        document.getElementById('stats').innerText = `Точки: ${points.length}`;
    });

    document.getElementById("sendBtn").onclick = async () => {
        if (points.length < 2) return alert("Първо начертайте път!");

        let commands = [];
        let tempHeading = currentHeading;

        for (let i = 0; i < points.length - 1; i++) {
            const p1 = points[i];
            const p2 = points[i+1];

            const distance = p1.distanceTo(p2);
            const targetHeading = getBearing(p1, p2);

            // Изчисляване на завоя
            let turnAngle = targetHeading - tempHeading;
            if (turnAngle > 180) turnAngle -= 360;
            if (turnAngle < -180) turnAngle += 360;

            const turnTime = Math.abs(turnAngle) / DEGREES_PER_SECOND;
            const driveTime = distance / METERS_PER_SECOND;

            if (Math.abs(turnAngle) > 5) {
                commands.push({ action: turnAngle > 0 ? "right" : "left", time: turnTime });
            }
            commands.push({ action: "forward", time: driveTime });

            tempHeading = targetHeading;
        }

        console.log("Изпращане на команди:", commands);
        const res = await fetch("http://localhost:3000/save-path", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(commands)
        });
        if(res.ok) alert("Маршрутът е изпратен успешно!");
    };

    document.getElementById("eraseBtn").onclick = () => {
        location.reload(); // Най-бързият начин да изчистим всичко
    };
</script>
</body>
</html>
